name: ✨ Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe the feature and the use case clearly.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point this feature would address.
      placeholder: I often want to ... but currently I have to ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought about?

  - type: dropdown
    id: component
    attributes:
      label: Which component?
      multiple: true
      options:
        - Watch App
        - Companion App
        - Backend
        - Documentation
        - Other
    validations:
      required: true
