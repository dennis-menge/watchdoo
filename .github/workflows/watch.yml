name: Watch & iOS Build

on:
  push:
    branches: [main]
    paths:
      - 'Watchdoo/**'
      - '.github/workflows/watch.yml'
  pull_request:
    paths:
      - 'Watchdoo/**'
      - '.github/workflows/watch.yml'

jobs:
  build:
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        target:
          - { scheme: 'Watchdoo Watch App', destination: 'generic/platform=watchOS Simulator' }
          - { scheme: 'Watchdoo',           destination: 'generic/platform=iOS Simulator'     }

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode and SDKs
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | head -20

      - name: Build ${{ matrix.target.scheme }}
        working-directory: Watchdoo/Watchdoo
        run: |
          set -o pipefail
          xcodebuild \
            -project Watchdoo.xcodeproj \
            -scheme "${{ matrix.target.scheme }}" \
            -destination '${{ matrix.target.destination }}' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify --renderer github-actions
        env:
          NSUnbufferedIO: YES
